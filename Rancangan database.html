
<style>
#erd { padding: 8px 0; }
#erd svg { max-width: 100%; }
.erd-title { font-size: 13px; font-weight: 500; color: var(--color-text-secondary); margin-bottom: 8px; text-align: center; }
</style>
<h2 class="sr-only">Entity Relationship Diagram — Sistem Keuangan Perelek Digital</h2>
<div class="erd-title">ERD / Database Design — Perelek Digital (v1.0)</div>
<div id="erd"></div>
<script type="module">
import mermaid from 'https://esm.sh/mermaid@11/dist/mermaid.esm.min.mjs';
const dark = matchMedia('(prefers-color-scheme: dark)').matches;
await document.fonts.ready;
mermaid.initialize({
  startOnLoad: false,
  theme: 'base',
  fontFamily: '"Anthropic Sans", sans-serif',
  themeVariables: {
    darkMode: dark,
    fontSize: '13px',
    fontFamily: '"Anthropic Sans", sans-serif',
    lineColor: dark ? '#9c9a92' : '#73726c',
    textColor: dark ? '#c2c0b6' : '#3d3d3a',
  },
});

const diagram = `erDiagram
  users {
    int id PK
    string name
    string email
    string phone
    string nik
    string password_hash
    enum role "ADMIN/WARGA"
    string photo_profil
    string blok_rumah
    string alamat
    enum status "ACTIVE/INACTIVE"
    datetime created_at
    datetime updated_at
  }

  refresh_tokens {
    int id PK
    int user_id FK
    string token
    datetime expires_at
    datetime created_at
  }

  otp_codes {
    int id PK
    int user_id FK
    string code
    enum type "EMAIL/SMS"
    datetime expires_at
    bool is_used
    datetime created_at
  }

  tagihan {
    int id PK
    string judul
    enum tipe "BULANAN/INSIDENTAL"
    int nominal
    date periode_bulan
    date deadline
    text deskripsi
    enum status "ACTIVE/INACTIVE"
    int created_by FK
    datetime created_at
    datetime updated_at
  }

  pembayaran {
    int id PK
    int tagihan_id FK
    int warga_id FK
    int nominal
    date tanggal_bayar
    enum metode "TRANSFER_BANK/E_WALLET/TUNAI"
    string foto_bukti_url
    enum status "PENDING/LUNAS/DITOLAK"
    int verified_by FK
    text catatan_admin
    datetime verified_at
    datetime created_at
    datetime updated_at
  }

  pengeluaran {
    int id PK
    date tanggal
    enum kategori "KEBERSIHAN/KEAMANAN/SOSIAL/ADMINISTRASI/LAINNYA"
    int nominal
    text deskripsi
    string foto_nota_url
    int created_by FK
    datetime created_at
    datetime updated_at
  }

  saldo_kas {
    int id PK
    int total_pemasukan
    int total_pengeluaran
    int saldo_akhir
    date periode_bulan
    datetime updated_at
  }

  kegiatan {
    int id PK
    string judul
    date tanggal
    time waktu
    string lokasi
    text deskripsi
    int created_by FK
    datetime created_at
    datetime updated_at
  }

  notifikasi {
    int id PK
    int user_id FK
    string judul
    text pesan
    enum tipe "TAGIHAN/VERIFIKASI/JADWAL/PENGUMUMAN"
    bool is_read
    string ref_id
    datetime sent_at
    datetime created_at
  }

  faq {
    int id PK
    string pertanyaan
    text jawaban
    int urutan
    bool is_active
    int created_by FK
    datetime created_at
    datetime updated_at
  }

  video_tutorial {
    int id PK
    string judul
    string url_video
    text deskripsi
    int urutan
    bool is_active
    int created_by FK
    datetime created_at
  }

  laporan {
    int id PK
    enum tipe "BULANAN/TAHUNAN/TUNGGAKAN/PRIBADI"
    date periode_awal
    date periode_akhir
    string file_url
    int generated_by FK
    int warga_id FK
    datetime created_at
  }

  ml_predictions {
    int id PK
    int user_id FK
    int tagihan_id FK
    decimal probabilitas_terlambat
    enum status_prediksi "TEPAT_WAKTU/BERESIKO/TERLAMBAT"
    datetime predicted_at
  }

  audit_logs {
    int id PK
    int user_id FK
    string aksi
    string tabel_target
    string record_id
    text data_lama
    text data_baru
    string ip_address
    datetime created_at
  }

  users ||--o{ refresh_tokens : "punya"
  users ||--o{ otp_codes : "minta"
  users ||--o{ pembayaran : "melakukan"
  users ||--o{ notifikasi : "menerima"
  users ||--o{ laporan : "milik pribadi"
  users ||--o{ ml_predictions : "diprediksi"
  users ||--o{ audit_logs : "melakukan aksi"
  tagihan ||--o{ pembayaran : "memiliki"
  tagihan ||--o{ ml_predictions : "diprediksi pada"
  users ||--o{ tagihan : "dibuat oleh"
  users ||--o{ pengeluaran : "dicatat oleh"
  users ||--o{ kegiatan : "dibuat oleh"
  users ||--o{ laporan : "digenerate oleh"
  users ||--o{ faq : "dikelola oleh"
  users ||--o{ video_tutorial : "dikelola oleh"
`;

const { svg } = await mermaid.render('erd-svg', diagram);
document.getElementById('erd').innerHTML = svg;

document.querySelectorAll('#erd svg.erDiagram .node').forEach(node => {
  const firstPath = node.querySelector('path[d]');
  if (!firstPath) return;
  const d = firstPath.getAttribute('d');
  const nums = d.match(/-?[\d.]+/g)?.map(Number);
  if (!nums || nums.length < 8) return;
  const xs = [nums[0], nums[2], nums[4], nums[6]];
  const ys = [nums[1], nums[3], nums[5], nums[7]];
  const x = Math.min(...xs), y = Math.min(...ys);
  const w = Math.max(...xs) - x, h = Math.max(...ys) - y;
  const rect = document.createElementNS('http://www.w3.org/2000/svg', 'rect');
  rect.setAttribute('x', x); rect.setAttribute('y', y);
  rect.setAttribute('width', w); rect.setAttribute('height', h);
  rect.setAttribute('rx', '8');
  for (const a of ['fill', 'stroke', 'stroke-width', 'class', 'style']) {
    if (firstPath.hasAttribute(a)) rect.setAttribute(a, firstPath.getAttribute(a));
  }
  firstPath.replaceWith(rect);
});

document.querySelectorAll('#erd svg.erDiagram .row-rect-odd path, #erd svg.erDiagram .row-rect-even path').forEach(p => {
  p.setAttribute('stroke', 'none');
});
</script>
